<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login – Shiv Tatva LMS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0B1F3A;--navy2:#152d52;--orange:#FF7A00;--orange2:#ff9633;--bg:#fdf6ef;--border:#e8ddd1;--muted:#7a8fb5}
body{font-family:'Manrope',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
.nav-wrap{padding:18px 5%}
nav{display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;text-decoration:none}
.nav-logo-img{height:54px;width:auto;max-width:220px;object-fit:contain;display:block}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 5%}
.card{background:#fff;border:1.5px solid var(--border);border-radius:28px;padding:48px 44px;width:100%;max-width:420px;box-shadow:0 12px 40px rgba(11,31,58,.1)}
.card h1{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;margin-bottom:6px}
.card .sub{font-size:14px;color:var(--muted);margin-bottom:28px;font-weight:500}
.tabs{display:flex;gap:8px;margin-bottom:24px;background:var(--bg);border-radius:50px;padding:4px}
.tab{flex:1;padding:10px;border:none;background:transparent;border-radius:50px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer}
.tab.active{background:var(--navy);color:#fff}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:6px}
input{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;font-family:'Manrope',sans-serif;font-size:14px;margin-bottom:16px;outline:none}
input:focus{border-color:var(--orange)}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px}
.row a{color:var(--orange);font-weight:700}
.btn-login{width:100%;background:var(--orange);color:#fff;border:none;padding:14px;border-radius:50px;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:16px}
.btn-login:hover{background:var(--orange2)}
.divider{text-align:center;font-size:12px;color:var(--muted);margin:16px 0;font-weight:600}
.signup{text-align:center;font-size:14px;color:var(--muted);font-weight:500}
.signup a{color:var(--orange);font-weight:800}
.msg{display:none;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;padding:12px;border-radius:12px;font-size:13px;font-weight:600;margin-bottom:16px}
.msg.show{display:block}
</style>
</head>
<body>
<div class="nav-wrap">
  <nav>
    <a href="index.html" class="nav-logo"><img src="assets/logo.png" alt="Shiv Tatva Solutions Private Limited" class="nav-logo-img"/></a>
    <a href="index.html" style="font-size:14px;font-weight:700;color:var(--muted)">← Home</a>
  </nav>
</div>
<div class="wrap">
  <div class="card">
    <h1>Welcome Back</h1>
    <p class="sub">Sign in to access your courses, assignments, and placement portal.</p>
    <div class="tabs">
      <button type="button" class="tab active" data-role="student">Student</button>
      <button type="button" class="tab" data-role="trainer">Trainer</button>
      <button type="button" class="tab" data-role="admin">Admin</button>
    </div>
    <div class="msg" id="msg">Signing you in…</div>
    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@email.com" required/>
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required/>
      <div class="row">
        <label style="display:flex;align-items:center;gap:6px;margin:0;font-weight:600">
          <input type="checkbox"/> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
    <div class="divider">— or —</div>
    <p class="signup">New student? <a href="apply.html">Apply for a program →</a> · <a href="pricing.html">View pricing</a></p>
  </div>
</div>
<script>
let activeRole = 'student';
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeRole = t.dataset.role;
  });
});
const rolePages = {
  student: 'dashboard.html',
  trainer: 'trainer-dashboard.html',
  admin: 'admin-dashboard.html'
};
document.getElementById('login-form').addEventListener('submit', e => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg');
  msg.textContent = 'Signing you in…';
  msg.classList.add('show');
  setTimeout(() => {
    location.href = rolePages[activeRole] + '?email=' + encodeURIComponent(email);
  }, 600);
});
</script>
</body>
</html>
