<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Course Curriculum – Shiv Tatva</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1F3A;--navy2:#152d52;--orange:#FF7A00;--orange2:#ff9633;
  --orange-soft:#fff3e8;--orange-mid:#ffd9b3;--bg:#fdf6ef;--border:#e8ddd1;
  --text:#0B1F3A;--text2:#2d4a6e;--muted:#7a8fb5;--green:#16a34a;--green-soft:#f0fdf4;
}
html{scroll-behavior:smooth}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text)}
.nav-wrap{padding:14px 5%;background:var(--bg);position:sticky;top:0;z-index:100}
nav{background:#fff;border-radius:50px;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(11,31,58,0.09);border:1px solid rgba(255,255,255,.9);gap:12px;flex-wrap:wrap}
.nav-logo{display:flex;align-items:center;text-decoration:none}
.nav-logo-img{height:48px;width:auto;max-width:200px;object-fit:contain}
.btn-back{border:1.5px solid var(--border);color:var(--navy);background:#fff;padding:8px 20px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
.btn-back:hover{border-color:var(--orange);color:var(--orange)}
.btn-enroll-nav{background:var(--orange);color:#fff;border:none;padding:8px 22px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(255,122,0,.3);transition:all .2s}
.btn-enroll-nav:hover{background:var(--orange2)}
.course-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);padding:56px 5% 52px;position:relative;overflow:hidden}
.course-hero::before{content:'';position:absolute;top:-80px;right:-80px;width:320px;height:320px;border-radius:50%;background:rgba(255,122,0,.12)}
.course-hero::after{content:'';position:absolute;bottom:-60px;left:30%;width:240px;height:240px;border-radius:50%;background:rgba(255,122,0,.07)}
.hero-inner{max-width:860px;position:relative;z-index:1}
.course-tag{display:inline-flex;align-items:center;gap:7px;background:rgba(255,122,0,.18);border:1px solid rgba(255,122,0,.35);color:var(--orange);font-size:12px;font-weight:700;padding:5px 14px;border-radius:50px;margin-bottom:18px;white-space:nowrap;line-height:1.2}
.course-tag-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);flex-shrink:0}
.course-tag-label{white-space:nowrap}
.course-hero h1{font-family:'Nunito',sans-serif;font-size:clamp(28px,4vw,46px);font-weight:900;color:#fff;margin-bottom:14px;line-height:1.15}
.course-hero h1 em{color:var(--orange);font-style:normal}
.course-hero p{font-size:16px;color:rgba(255,255,255,.7);margin-bottom:28px;max-width:600px;line-height:1.7;font-weight:500}
.hero-meta{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:28px}
.hm-item{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.8);font-size:14px;font-weight:600}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-hero-enroll{background:var(--orange);color:#fff;border:none;padding:13px 32px;border-radius:50px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 6px 22px rgba(255,122,0,.4);transition:all .25s}
.btn-hero-enroll:hover{background:var(--orange2);transform:translateY(-2px)}
.btn-hero-outline{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.3);padding:13px 28px;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;transition:all .25s}
.btn-hero-outline:hover{border-color:#fff}
.stats-strip{background:#fff;padding:28px 5%;border-bottom:1px solid var(--border);display:flex;justify-content:space-around;flex-wrap:wrap;gap:16px}
.ss-item{text-align:center}
.ss-num{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:var(--orange)}
.ss-lbl{font-size:12px;color:var(--muted);font-weight:600;margin-top:3px}
.main-wrap{max-width:1200px;margin:0 auto;padding:48px 5%;display:grid;grid-template-columns:1fr 340px;gap:40px;align-items:start}
.tab-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;background:#fff;padding:8px;border-radius:16px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(11,31,58,.05)}
.tab-btn{flex:1;min-width:80px;padding:10px 6px;border:none;background:transparent;border-radius:10px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center;white-space:nowrap}
.tab-btn:hover{color:var(--orange);background:var(--orange-soft)}
.tab-btn.active{background:var(--orange);color:#fff;box-shadow:0 4px 12px rgba(255,122,0,.3)}
.month-panel{display:none}
.month-panel.active{display:block}
.month-header{background:#fff;border:1px solid var(--border);border-radius:20px;padding:24px 28px;margin-bottom:24px;display:flex;align-items:center;gap:20px;box-shadow:0 2px 10px rgba(11,31,58,.05)}
.month-badge{width:64px;height:64px;border-radius:16px;background:var(--orange);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 18px rgba(255,122,0,.3)}
.month-badge .mn{font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,.8);text-transform:uppercase}
.month-badge .num{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:#fff;line-height:1}
.month-info h2{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:var(--navy);margin-bottom:4px}
.month-info p{font-size:14px;color:var(--text2);font-weight:500;line-height:1.6}
.month-tag{display:inline-block;background:var(--orange-soft);color:var(--orange);font-size:11px;font-weight:700;padding:3px 10px;border-radius:50px;margin-top:6px;border:1px solid var(--orange-mid)}
.weeks-grid{display:flex;flex-direction:column;gap:16px}
.week-card{background:#fff;border:1.5px solid var(--border);border-radius:18px;overflow:hidden;transition:all .3s}
.week-card:hover{border-color:var(--orange);box-shadow:0 6px 22px rgba(255,122,0,.10)}
.week-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;user-select:none}
.week-head-left{display:flex;align-items:center;gap:14px}
.week-num{width:36px;height:36px;border-radius:10px;background:var(--orange-soft);border:1.5px solid var(--orange-mid);display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;color:var(--orange);flex-shrink:0}
.week-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:var(--navy)}
.week-subtitle{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px}
.week-toggle{width:28px;height:28px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .3s;flex-shrink:0;color:var(--muted)}
.week-card.open .week-toggle{background:var(--orange);color:#fff;border-color:var(--orange);transform:rotate(180deg)}
.week-body{display:none;padding:0 20px 18px;border-top:1px solid var(--border)}
.week-card.open .week-body{display:block}
.topics-list{list-style:none;padding-top:14px;display:flex;flex-direction:column;gap:10px}
.topic-item{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--text2);font-weight:500}
.topic-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ti-video{background:#ede9fe}.ti-code{background:#dcfce7}.ti-quiz{background:#fef9c3}.ti-project{background:#ffedd5}.ti-lab{background:#cffafe}
.topic-type{font-size:11px;color:var(--muted);margin-left:auto;background:var(--bg);padding:2px 8px;border-radius:50px;font-weight:600;white-space:nowrap}
.skills-section{background:#fff;border:1px solid var(--border);border-radius:18px;padding:22px 24px;margin-top:20px}
.skills-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:var(--navy);margin-bottom:14px}
.skills-wrap{display:flex;flex-wrap:wrap;gap:8px}
.skill-chip{background:var(--navy);color:#fff;font-size:12px;font-weight:700;padding:5px 13px;border-radius:50px}
.skill-chip.orange{background:var(--orange)}
.overview-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
.ov-pill{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--border);border-radius:50px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--text2)}
.month-progress{display:flex;gap:6px;margin-bottom:10px}
.mp-dot{height:4px;flex:1;border-radius:2px;background:var(--border)}
.mp-dot.done{background:var(--orange)}
.sidebar{position:sticky;top:90px}
.sidebar-card{background:#fff;border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(11,31,58,.08)}
.sc-thumb{height:180px;display:flex;align-items:center;justify-content:center;font-size:72px}
.cc-java{background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
.cc-python{background:linear-gradient(135deg,#fef9c3,#fde68a)}
.cc-cloud,.cc-aws{background:linear-gradient(135deg,#ffedd5,#fed7aa)}
.cc-cyber{background:linear-gradient(135deg,#fee2e2,#fecaca)}
.cc-sap{background:linear-gradient(135deg,#dbeafe,#93c5fd)}
.cc-salesforce{background:linear-gradient(135deg,#e0f2fe,#7dd3fc)}
.cc-ai{background:linear-gradient(135deg,#ede9fe,#ddd6fe)}
.btn-brochure{display:block;width:100%;margin-bottom:10px;padding:12px;border-radius:50px;font-size:14px;font-weight:800;cursor:pointer;background:var(--navy);color:#fff;border:none;text-align:center;text-decoration:none}
.btn-brochure:hover{background:var(--navy2)}
.sc-body{padding:22px}
.tier-picker-wrap{margin-bottom:28px}
.tier-picker-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:var(--navy);margin-bottom:14px}
.tier-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.tier-card{background:#fff;border:2px solid var(--border);border-radius:18px;padding:18px 16px;cursor:pointer;transition:all .25s;text-align:center}
.tier-card:hover{border-color:var(--orange);box-shadow:0 6px 20px rgba(255,122,0,.12)}
.tier-card.active{border-color:var(--orange);background:var(--orange-soft);box-shadow:0 8px 24px rgba(255,122,0,.18)}
.tier-card-name{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:var(--navy);margin-bottom:4px}
.tier-card.active .tier-card-name{color:var(--orange)}
.tier-card-price{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:var(--navy);margin-bottom:6px}
.tier-card-meta{font-size:11px;color:var(--muted);font-weight:600;line-height:1.4}
.tier-card-badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 10px;border-radius:50px;margin-top:8px}
.tier-basic .tier-card-badge{background:#f0fdf4;color:#166534}
.tier-pro .tier-card-badge{background:var(--orange-soft);color:var(--orange)}
.tier-premium .tier-card-badge{background:var(--navy);color:#fff}
.tier-modules-box{background:#fff;border:1px solid var(--border);border-radius:18px;padding:20px 22px;margin-bottom:28px}
.tier-modules-title{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--navy);margin-bottom:12px}
.tier-module-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.tier-module-list li{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:var(--text2);padding:10px 12px;background:var(--bg);border-radius:10px}
.tier-module-list li::before{content:'✓';color:var(--green);font-weight:900;flex-shrink:0}
.tier-compare-wrap{background:#fff;border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:28px;overflow-x:auto}
.tier-compare-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:var(--navy);margin-bottom:14px}
.tier-compare-table{width:100%;border-collapse:collapse;font-size:13px}
.tier-compare-table th,.tier-compare-table td{padding:12px 14px;text-align:center;border-bottom:1px solid var(--border);font-weight:600;color:var(--text2)}
.tier-compare-table th{font-family:'Nunito',sans-serif;font-weight:800;color:var(--navy);background:var(--bg)}
.tier-compare-table td:first-child{text-align:left;font-weight:700;color:var(--navy)}
.tier-compare-table th.col-basic{color:#166534}
.tier-compare-table th.col-pro{color:var(--orange)}
.tier-compare-table th.col-premium{color:var(--navy)}
.tier-compare-table tr:last-child td,.tier-compare-table tr:last-child th{border-bottom:none}
.tier-compare-table .hl{background:var(--orange-soft)}
.sc-plan-label{font-size:12px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sc-price{font-family:'Nunito',sans-serif;font-size:32px;font-weight:900;color:var(--navy);margin-bottom:4px}
.sc-tier-note{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:16px}
.btn-enroll-big,.btn-demo{width:100%;padding:14px;border-radius:50px;font-size:15px;font-weight:800;cursor:pointer;transition:all .25s;margin-bottom:10px;border:none}
.btn-enroll-big{background:var(--orange);color:#fff;box-shadow:0 6px 20px rgba(255,122,0,.35)}
.btn-enroll-big:hover{background:var(--orange2)}
.btn-demo{background:#fff;color:var(--navy);border:1.5px solid var(--navy)!important;font-size:14px;font-weight:700}
.btn-demo:hover{border-color:var(--orange)!important;color:var(--orange)}
.sc-includes{list-style:none;display:flex;flex-direction:column;gap:10px}
.sc-includes li{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);font-weight:500}
.sc-includes li::before{content:'✓';width:20px;height:20px;border-radius:50%;background:var(--green-soft);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;border:1px solid #bbf7d0}
.sc-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.sc-guarantee{text-align:center;font-size:12px;color:var(--muted);font-weight:500}
@media(max-width:900px){.main-wrap{grid-template-columns:1fr}.sidebar{position:static}.tier-picker-grid{grid-template-columns:1fr}}
@media(max-width:600px){.tab-btn{font-size:11px;padding:8px 4px}.course-hero{padding:40px 5% 36px}}
</style>
</head>
<body>

<div class="nav-wrap">
  <nav>
    <a class="nav-logo" href="index.html"><img src="assets/logo.png" alt="Shiv Tatva" class="nav-logo-img"/></a>

  <div class="hero-inner">

      <div class="tier-picker-title">Choose Your Plan</div>
      <div class="tier-picker-grid" id="tier-picker"></div>
    </div>
    <div class="tier-modules-box">
      <div class="tier-modules-title" id="tier-modules-title">Modules included</div>

<script>
let activeTier = 'pro';
let courseId = 'java';

function getCourseId() {
  const p = new URLSearchParams(location.search);
  return p.get('course') || p.get('id') || 'java';
}

function getTierFromUrl() {
  const t = new URLSearchParams(location.search).get('tier');
  return TIER_PLANS[t] ? t : 'pro';
}

function enrollUrl(id, tier) {
  return 'apply.html?type=course&course=' + id + '&tier=' + tier;
}

function switchTab(n) {
  document.querySelectorAll('.month-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('month-' + n);
  const btn = document.querySelectorAll('.tab-btn')[n - 1];
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
  window.scrollTo({ top: 160, behavior: 'smooth' });
}

function toggleWeek(head) {
  head.closest('.week-card').classList.toggle('open');
}

function renderTopics(topics) {
  return topics.map(t => {
    const [emoji, cls, title, type] = t;
    return '<li class="topic-item"><div class="topic-icon ' + cls + '">' + emoji + '</div>' +
      title + '<span class="topic-type">' + type + '</span></li>';
  }).join('');
}

function renderWeeks(weeks) {
  return weeks.map((wk, i) => {
    const open = i === 0 ? ' open' : '';
    return '<div class="week-card' + open + '">' +
      '<div class="week-head" onclick="toggleWeek(this)">' +
      '<div class="week-head-left"><div class="week-num">W' + wk.w + '</div>' +
      '<div><div class="week-title">' + wk.title + '</div>' +
      '<div class="week-subtitle">' + wk.sub + '</div></div></div>' +
      '<div class="week-toggle">▼</div></div>' +
      '<div class="week-body"><ul class="topics-list">' + renderTopics(wk.topics) + '</ul></div></div>';
  }).join('');
}

function renderMonth(m, totalMonths) {
  const dots = Array.from({ length: totalMonths }, (_, i) =>
    '<div class="mp-dot' + (i < m.num ? ' done' : '') + '"></div>'
  ).join('');
  const numStr = String(m.num).padStart(2, '0');
  const skills = (m.skills || []).map((s, i) => {
    const orange = (m.skillsOrange || []).includes(i);
    return '<div class="skill-chip' + (orange ? ' orange' : '') + '">' + s + '</div>';
  }).join('');
  return '<div class="month-panel' + (m.num === 1 ? ' active' : '') + '" id="month-' + m.num + '">' +
    '<div class="month-header"><div class="month-badge"><span class="mn">Month</span><span class="num">' + numStr + '</span></div>' +
    '<div class="month-info"><div class="month-progress">' + dots + '</div>' +
    '<h2>' + m.title + '</h2><p>' + m.desc + '</p>' +
    '<div class="month-tag">' + m.tag + '</div></div></div>' +
    '<div class="weeks-grid">' + renderWeeks(m.weeks) + '</div>' +
    '<div class="skills-section"><div class="skills-title">🎯 Skills You\'ll Gain This Month</div>' +
    '<div class="skills-wrap">' + skills + '</div></div></div>';
}

function renderTierPicker(course) {
  const picker = document.getElementById('tier-picker');
  picker.innerHTML = ['basic', 'pro', 'premium'].map(tid => {
    const plan = TIER_PLANS[tid];
    const months = course.tierMonths[tid];
    return '<div class="tier-card tier-' + tid + (tid === activeTier ? ' active' : '') + '" data-tier="' + tid + '" onclick="selectTier(\'' + tid + '\')">' +
      '<div class="tier-card-name">' + plan.name + '</div>' +
      '<div class="tier-card-price">' + plan.price + '</div>' +
      '<div class="tier-card-meta">' + months + ' month' + (months > 1 ? 's' : '') + ' · ' + course.tierModules[tid].length + ' modules</div>' +
      '<span class="tier-card-badge">' + plan.durationNote + '</span></div>';
  }).join('');
}

function renderCompareTable(activeCol) {
  const cols = ['basic', 'pro', 'premium'];
  let html = '<thead><tr><th>Feature</th>';
  cols.forEach(t => {
    html += '<th class="col-' + t + (t === activeCol ? ' hl' : '') + '">' + TIER_PLANS[t].name + '</th>';
  });
  html += '</tr></thead><tbody>';
  TIER_COMPARE_ROWS.forEach(row => {
    html += '<tr><td>' + row.label + '</td>';
    cols.forEach(t => {
      html += '<td class="' + (t === activeCol ? 'hl' : '') + '">' + row[t] + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody>';
  document.getElementById('tier-compare-table').innerHTML = html;
}

function renderTierModules(course, tierId) {
  const plan = TIER_PLANS[tierId];
  document.getElementById('tier-modules-title').textContent =
    plan.name + ' plan — modules included (' + course.tierMonths[tierId] + ' months)';
  document.getElementById('tier-module-list').innerHTML =
    course.tierModules[tierId].map(m => '<li>' + m + '</li>').join('');
}

function renderCurriculum(curr, monthCount) {
  const months = curr.months.slice(0, monthCount);
  document.getElementById('tab-bar').innerHTML = months.map((m, i) =>
    '<button class="tab-btn' + (i === 0 ? ' active' : '') + '" onclick="switchTab(' + m.num + ')">Month ' + m.num + '</button>'
  ).join('');
  document.getElementById('months-root').innerHTML = months.map(m =>
    renderMonth(m, monthCount)
  ).join('');
}

function updateTierUI() {
  const course = COURSES[courseId];
  const curr = CURRICULA[courseId] || CURRICULA.java;
  const plan = TIER_PLANS[activeTier];
  const monthCount = course.tierMonths[activeTier];
  const apply = enrollUrl(courseId, activeTier);

  renderTierPicker(course);
  renderTierModules(course, activeTier);
  renderCompareTable(activeTier);
  renderCurriculum(curr, monthCount);

  document.getElementById('sc-plan-label').textContent = plan.name + ' Plan';
  document.getElementById('sc-price').textContent = plan.price;
  document.getElementById('sc-tier-note').textContent =
    monthCount + ' month curriculum · ' + course.tierModules[activeTier].length + ' modules';
  document.getElementById('hero-enroll').textContent = 'Enroll ' + plan.name + ' – ' + plan.price;
  const demo = () => location.href = 'apply.html?type=course&course=' + courseId + '&tier=' + activeTier;
  document.getElementById('hero-enroll').onclick = () => location.href = apply;
  document.getElementById('nav-enroll').onclick = () => location.href = apply;
  document.getElementById('sidebar-enroll').onclick = () => location.href = apply;
  document.getElementById('hero-demo').onclick = demo;
  document.getElementById('sidebar-demo').onclick = demo;
  document.getElementById('sc-includes').innerHTML =
    course.tierIncludes[activeTier].map(x => '<li>' + x + '</li>').join('');

  const params = new URLSearchParams(location.search);
  params.set('tier', activeTier);
  history.replaceState(null, '', '?' + params.toString());
}

function selectTier(tierId) {
  activeTier = tierId;
  updateTierUI();
  window.scrollTo({ top: 320, behavior: 'smooth' });
}

function initPage() {
  courseId = getCourseId();
  activeTier = getTierFromUrl();
  const course = COURSES[courseId] || COURSES.java;
  const c = CURRICULA[courseId] || CURRICULA.java;
  const pageTitle = c.titleEm ? c.title + ' ' + c.titleEm : c.title;
  document.title = pageTitle + ' – Course Curriculum | Shiv Tatva';

  document.getElementById('hero-cat').textContent = c.cat + ' · 3 Plans';
  const heroTitle = document.getElementById('hero-title');
  if (c.titleEm) {
    heroTitle.innerHTML = c.title + ' <em>' + c.titleEm + '</em>';
  } else {
    const words = c.title.split(' ');
    const last = words.pop();
    heroTitle.innerHTML = words.join(' ') + (words.length ? ' ' : '') + '<em>' + last + '</em>';
  }
  document.getElementById('hero-desc').textContent = c.heroDesc;
  document.getElementById('hero-meta').innerHTML =
    '<div class="hm-item"><span>📦</span>Basic ₹40K · Pro ₹70K · Premium ₹1.2L</div>' +
    '<div class="hm-item"><span>⏱</span>Up to ' + course.totalMonths + ' Months</div>' +
    '<div class="hm-item"><span>📹</span>' + c.videos + ' Video Lessons</div>' +
    '<div class="hm-item"><span>🏅</span>Certificate Included</div>' +
    '<div class="hm-item"><span>💼</span>Doubt · Resume · LinkedIn · Placement Materials</div>' +
    '<div class="hm-item"><span>⭐</span>' + c.reviews + '</div>';

  document.getElementById('stats-strip').innerHTML = [
    ['3', 'Plan Types'],
    ['₹40K', 'Basic Course'],
    ['₹70K', 'Pro Course'],
    ['₹1.2L', 'Premium Course'],
    [course.students, 'Students']
  ].map(s => '<div class="ss-item"><div class="ss-num">' + s[0] + '</div><div class="ss-lbl">' + s[1] + '</div></div>').join('');

  document.getElementById('overview-pills').innerHTML = c.pills.map(p => {
    const parts = p.split(' ');
    return '<div class="ov-pill"><span>' + parts[0] + '</span> ' + parts.slice(1).join(' ') + '</div>';
  }).join('');

  const thumb = document.getElementById('sc-thumb');
  thumb.textContent = c.emoji;
  thumb.className = 'sc-thumb ' + c.thumb;

  const brochureEl = document.getElementById('sidebar-brochure');
  if (brochureEl && course.brochure) {
    brochureEl.href = course.brochure;
    brochureEl.style.display = 'block';
  } else if (brochureEl) {
    brochureEl.style.display = 'none';
  }

  updateTierUI();
}

initPage();
</script>
</body>
</html>
