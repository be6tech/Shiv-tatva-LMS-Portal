<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Internship – Shiv Tatva LMS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0B1F3A;--orange:#FF7A00;--bg:#fdf6ef;--border:#e8ddd1;--muted:#7a8fb5;--text2:#2d4a6e;--green:#16a34a}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--navy)}
a{text-decoration:none;color:inherit}
.nav-wrap{padding:18px 5%}
nav{display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;text-decoration:none}
.nav-logo-img{height:54px;width:auto;max-width:220px;object-fit:contain;display:block}
.detail{padding:40px 5% 80px;display:grid;grid-template-columns:1fr 320px;gap:36px;max-width:1100px;margin:0 auto}
.card{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px}
.card h1{font-family:'Nunito',sans-serif;font-size:clamp(22px,4vw,30px);font-weight:900;margin:12px 0}
.company{font-size:13px;font-weight:700;color:var(--muted)}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 12px;border-radius:50px;margin-bottom:8px}
.badge-hot{background:#fff3e8;color:var(--orange)}
.badge-open{background:#f0fdf4;color:var(--green)}
.badge-new{background:#ede9fe;color:#7c3aed}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.tag{background:var(--bg);border:1px solid var(--border);padding:5px 12px;border-radius:50px;font-size:11px;font-weight:700}
.desc{font-size:15px;color:var(--text2);line-height:1.75;font-weight:500}
.card h2{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;margin-bottom:12px}
.resp{list-style:none;display:flex;flex-direction:column;gap:8px}
.resp li{font-size:14px;font-weight:600;color:var(--text2);padding-left:18px;position:relative}
.resp li::before{content:'•';position:absolute;left:0;color:var(--orange)}
.side{position:sticky;top:24px}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;font-weight:600}
.info-row span:first-child{color:var(--muted)}
.btn-apply{width:100%;background:var(--navy);color:#fff;border:none;padding:14px;border-radius:50px;font-weight:800;margin-top:16px;cursor:pointer}
.btn-apply:hover{background:var(--orange)}
@media(max-width:800px){.detail{grid-template-columns:1fr}.side{position:static}}
</style>
</head>
<body>
<div class="nav-wrap">
  <nav>
    <a href="index.html" class="nav-logo"><img src="assets/logo.png" alt="Shiv Tatva Solutions Private Limited" class="nav-logo-img"/></a>
    <a href="index.html#programs" style="font-weight:700;color:var(--muted)">← Internships</a>
  </nav>
</div>
<main class="detail">
  <div>
    <div class="card">
      <span class="badge" id="badge"></span>
      <div style="font-size:48px" id="emoji"></div>
      <div class="company" id="company"></div>
      <h1 id="role"></h1>
      <div class="tags" id="tags"></div>
      <p class="desc" id="desc"></p>
    </div>
    <div class="card">
      <h2>What you'll do</h2>
      <ul class="resp" id="resp"></ul>
    </div>
  </div>
  <aside class="side">
    <div class="card">
      <div class="info-row"><span>Stipend</span><span id="stipend"></span></div>
      <div class="info-row"><span>Duration</span><span id="duration"></span></div>
      <div class="info-row"><span>Mode</span><span id="mode"></span></div>
      <div class="info-row"><span>Seats</span><span id="seats"></span></div>
      <div class="info-row" style="border:none"><span>Deadline</span><span id="deadline"></span></div>
      <button class="btn-apply" id="btn-apply">Apply Now →</button>
    </div>
  </aside>
</main>
<script src="internships.js"></script>
<script>
const id = new URLSearchParams(location.search).get('id') || 'java';
const i = INTERNSHIPS[id] || INTERNSHIPS.java;
document.title = i.role + ' – Shiv Tatva LMS';
document.getElementById('badge').className = 'badge badge-' + i.badge;
document.getElementById('badge').textContent = i.badge === 'hot' ? '🔥 Hot' : i.badge === 'new' ? '🆕 New' : '✅ Open';
document.getElementById('emoji').textContent = i.emoji;
document.getElementById('company').textContent = i.company;
document.getElementById('role').textContent = i.role;
document.getElementById('desc').textContent = i.desc;
['stipend','duration','mode','seats','deadline'].forEach(k => document.getElementById(k).textContent = i[k]);
document.getElementById('tags').innerHTML = i.tags.map(t => '<span class="tag">' + t + '</span>').join('');
document.getElementById('resp').innerHTML = i.responsibilities.map(r => '<li>' + r + '</li>').join('');
document.getElementById('btn-apply').onclick = () => location.href = 'apply.html?type=internship&role=' + i.id;
</script>
</body>
</html>
